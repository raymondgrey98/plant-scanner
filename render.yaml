services:
  - type: web
    name: floraiq-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ARGUS_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PORT
        value: 10000
