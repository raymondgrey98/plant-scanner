<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FloraIQ — AI-powered biological identification, survival toolkit, hiker safety, and farming assistant. Identify plants, insects, birds, mushrooms and more." />
    <meta name="theme-color" content="#16a34a" />
    <title>FloraIQ — Biological Intelligence Platform</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

    <style>
      /* Leaflet override for dark theme */
      .leaflet-container { background: #18181b; font-family: 'Space Grotesk', sans-serif; }
      .leaflet-popup-content-wrapper { background: #18181b; color: #e4e4e7; border: 1px solid #3f3f46; border-radius: 10px; }
      .leaflet-popup-tip { background: #18181b; }
      .leaflet-control-zoom a { background: #27272a; color: #e4e4e7; border-color: #3f3f46; }
      .leaflet-control-zoom a:hover { background: #3f3f46; }
      .leaflet-bar { border: 1px solid #3f3f46 !important; }

      /* PWA install prompt */
      #pwa-prompt { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:9999; background:#18181b; border:1px solid #3f3f46; border-radius:12px; padding:12px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // PWA Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[SW] Registered:', reg.scope);
          }).catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
