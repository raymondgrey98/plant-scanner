<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FloraIQ — AI-powered biological identification, survival toolkit, hiker safety, and farming assistant. Identify plants, insects, birds, mushrooms and more." />
    <meta name="theme-color" content="#080808" />
    <title>FloraIQ — Biological Intelligence Platform</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      html, body { margin: 0; padding: 0; background: #080808; }
      /* PWA install prompt */
      #pwa-prompt { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:9999; background:#111; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 32px rgba(0,0,0,.6); color:#d8d8d8; font-family:'Inter',sans-serif; font-size:13px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // PWA Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[SW] Registered:', reg.scope);
          }).catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
